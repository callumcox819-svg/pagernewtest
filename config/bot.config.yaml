  - country: "ZM"
    language: "English"
    telegramLink: "https://t.me/example_zm"
    registrationKeywords:
      - "id"
      - "account number"
      - "registered"
    depositKeywords:
      - "balance"
      - "deposit"
      - "funded"
    noMoneyKeywords:
      - "no money"
      - "not ready"
      - "later"
      - "broke"
      - "can't afford"
    notReadyKeywords:
      - "later"
      - "not now"
      - "tomorrow"
      - "too busy"
      - "no time"
    proofRules:
      - kind: "registration_screenshot"
        nextStage: "registered"
        nextTemplateRole: "deposit"
      - kind: "id_screenshot"
        nextStage: "deposit_pending"
        nextTemplateRole: "deposit"
      - kind: "deposit_balance_screenshot"
        nextStage: "post_deposit"
        nextTemplateRole: "telegram_handoff"
      - kind: "unclear_screenshot"
        nextStage: "waiting_id"
        nextTemplateRole: "ask_clear_screenshot"
    textRules:
      - name: "interested"
        matchAny: ["interested", "tell me more", "yes"]
        nextStage: "engaged"
        nextTemplateRole: "details"
      - name: "registered"
        matchAny: ["done", "registered", "account created"]
