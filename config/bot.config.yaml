templateBanks:
  - name: "eg-default"
    roles:
      intro: "أهلاً، إذا كنت مهتمًا أشرح لك الطريقة خطوة بخطوة."
      details: "هتعمل حساب من اللينك + كود EG011، وبعدها أشرح لك باقي الخطوات."
      registration: "سجّل من اللينك، اختار مصر وEGP، واستخدم كود EG011. لو SMS ما وصلش استخدم الإيميل."
      deposit: "بعد ما تتأكد إن الحساب اشتغل، اعمل إيداع وابعتلي سكرين واضح يظهر البيانات المطلوبة."
      ask_id: "ابعتلي لقطة شاشة واضحة يظهر فيها رقم العميل أو الـ ID."
      ask_clear_screenshot: "السكرين مش واضح كفاية. ابعت لقطة كاملة يظهر فيها الـ ID أو الرصيد بوضوح."
      telegram_handoff: "تمام، الإيداع ظاهر. ده لينك التليجرام للخطوة اللي بعد كده: https://t.me/example_eg"
      no_money: "تمام، لما تكون جاهز ماديًا ابعتلي وأنا أرجع أكملك من نفس النقطة."
      reactivation: "لسه عندنا أماكن متاحة، لو حابب نكمل ابعتلي."

  - name: "cm-default"
    roles:
      intro: "Bonjour, si vous voulez je peux vous expliquer comment commencer."
      details: "Je vais vous montrer les etapes exactes pour creer le compte et continuer."
      registration: "Creez le compte avec mon lien puis envoyez-moi une capture claire."
      deposit: "Une fois inscrit, faites le depot et envoyez-moi une capture avec les informations visibles."
      ask_id: "Envoyez-moi une capture ou l'identifiant du compte est bien visible."
      ask_clear_screenshot: "La capture n'est pas assez claire. Envoyez une image complete et lisible."
      telegram_handoff: "Le depot est visible. Voici le lien Telegram pour la suite: https://t.me/example_cm"
      no_money: "D'accord, quand vous aurez de l'argent, écrivez-moi et nous reprendrons. Je serai là pour vous."
      reactivation: "Il reste encore quelques places, écrivez-moi si vous voulez continuer."

  - name: "zm-default"
    roles:
      intro: "Hello, if you are interested I can explain the process step by step."
      details: "I will guide you through registration, deposit, and the exact next actions."
      registration: "Create the account with my link, then send a clear screenshot showing your account details."
      deposit: "Once registration is confirmed, make the deposit and send a screenshot showing the balance."
      ask_id: "Please send a clear screenshot where the account ID is visible."
      ask_clear_screenshot: "The screenshot is unclear. Please send a full and clear image with the ID or balance visible."
      telegram_handoff: "Deposit confirmed. Here is the Telegram link for the next step: https://t.me/example_zm"
      no_money: "No problem. Message me when you are ready and we will continue."
      reactivation: "There is still a spot available if you want to continue."

playbooks:
  - country: "EG"
    language: "Arabic"
    promoCode: "EG011"
    telegramLink: "https://t.me/example_eg"
    registrationKeywords:
      - "id"
      - "client"
      - "رقم"
      - "عميل"
    depositKeywords:
      - "balance"
      - "deposit"
      - "رصيد"
      - "إيداع"
    noMoneyKeywords:
      - "مش معايه فلوس"
      - "مش معاي فلوس"
      - "no money"
      - "مصاري"
      - "معنديش فلوس"
      - "مفيش فلوس"
    notReadyKeywords:
      - "بعدين"
      - "مش دلوقتي"
      - "لاحقا"
    proofRules:
      - kind: "registration_screenshot"
        nextStage: "registered"
        nextTemplateRole: "deposit"
      - kind: "id_screenshot"
        nextStage: "deposit_pending"
        nextTemplateRole: "deposit"
      - kind: "deposit_balance_screenshot"
        nextStage: "post_deposit"
        nextTemplateRole: "telegram_handoff"
      - kind: "unclear_screenshot"
        nextStage: "waiting_id"
        nextTemplateRole: "ask_clear_screenshot"
    textRules:
      - name: "interested"
        matchAny: ["أنا مهتم", "أريد أن أستثمر", "نعم", "details"]
        nextStage: "engaged"
        nextTemplateRole: "details"
      - name: "registered"
        matchAny: ["عملت حساب", "سجلت", "registered"]
        nextStage: "registered"
        nextTemplateRole: "deposit"
      - name: "deposited"
        matchAny: ["عملت إيداع", "ايداع", "deposited"]
        nextStage: "post_deposit"
        nextTemplateRole: "telegram_handoff"

  - country: "CM"
    language: "French"
